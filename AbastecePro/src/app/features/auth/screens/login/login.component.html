<!-- Pantalla de Login del ERP AbastecePro -->
<div class="login-page">
  <div class="login-container animate-fade-in-scale">
    <!-- Logo y título -->
    <div class="login-header">
      <div class="login-logo">
        <img src="assets/abastecepro-logo-darkmode.png" alt="AbastecePro" class="login-logo__img" />
      </div>
      <h1 class="login-title heading-gradient">AbastecePro</h1>
      <p class="login-subtitle">Sistema de Gestión de Compras</p>
    </div>

    <!-- Formulario de login -->
    <form class="login-form" (ngSubmit)="onSubmit()">
      <!-- Campo de correo -->
      <div class="form-group">
        <label class="form-label" for="correo">Correo electrónico</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input
            id="correo"
            type="email"
            class="form-input"
            placeholder="correo@empresa.com"
            [ngModel]="vm.correo()"
            (ngModelChange)="vm.correo.set($event)"
            name="correo"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <!-- Campo de contraseña -->
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="••••••••"
            [ngModel]="vm.password()"
            (ngModelChange)="vm.password.set($event)"
            name="password"
            autocomplete="current-password"
            required
          />
        </div>
      </div>

      <!-- Mensaje de error -->
      @if (vm.errorMessage()) {
        <div class="login-error animate-slide-down">
          <span>⚠️</span>
          {{ vm.errorMessage() }}
        </div>
      }

      <!-- Botón de login -->
      <button
        type="submit"
        class="login-btn"
        [disabled]="!vm.isFormValid() || vm.isLoading()"
      >
        @if (vm.isLoading()) {
          <span class="spinner"></span>
          Iniciando sesión...
        } @else {
          Iniciar Sesión
        }
      </button>
    </form>


  </div>
</div>
